name: Predict Cron

# Council mandate (Sprint 7): twice daily — 5am UTC catches early scrapes,
# 22:00 UTC catches West Coast game confirmations.
on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape on Fly.io
        # Sprint 10.6: failures here are NOT silently swallowed. If this
        # curl fails the whole workflow fails and we find out on the same
        # day rather than four days later. `sport=all` explicitly scrapes
        # every league (nfl/nba/mlb/nhl/mls/epl) — this replaces the
        # deleted scrape-cron.yml which was *supposed* to cover every
        # league but had been hitting a dead /api/trigger-cycle route.
        # The endpoint returns 502 if any ESPN fetch fail-closes, so -f
        # will turn a silent upstream outage into a red workflow run.
        run: |
          curl -sSf -X POST "https://sportsdata-api.fly.dev/api/trigger/scrape?sport=all" \
            -H "Authorization: Bearer ${{ secrets.PREDICT_TRIGGER_TOKEN }}" \
            --max-time 600

      - name: Trigger predict on Fly.io
        # sport=all generates v2 winner + v4-spread predictions for every
        # league, not just NBA. The endpoint returns 502 if any sport fails
        # (partial failure). We print the response body to see which sport
        # errored, then fail the step so the alert fires.
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://sportsdata-api.fly.dev/api/trigger/predict?sport=all" \
            -H "Authorization: Bearer ${{ secrets.PREDICT_TRIGGER_TOKEN }}" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Predict returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Predict cron failed! Check https://sportsdata-api.fly.dev/api/health for staleness."
          echo "::error::Last successful scrape and predict timestamps should be within 24 hours."
