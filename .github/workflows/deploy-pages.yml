name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'vite.config.ts'
      - 'package.json'
  workflow_dispatch:  # P3: allow manual trigger (was missing per infra review)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx vite build
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://sportsdata-api.fly.dev' }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=sportsdata
