app = 'sportsdata-api'
primary_region = 'dfw'

[build]

[env]
  PORT = '3001'
  NODE_ENV = 'production'
  SQLITE_PATH = '/app/data/sqlite/sportsdata.db'
  LOGS_DIR = '/app/data/logs'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'sportsdata_vol'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
