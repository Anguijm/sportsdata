name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        # Try both common script names — repos use either `typecheck` or
        # `type-check`. --if-present silently skips missing scripts, so
        # whichever exists wins; if neither, this step is a no-op.
        run: |
          npm run typecheck --if-present
          npm run type-check --if-present

      - name: Test
        run: npm test --if-present

  council-script-check:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pip install council deps
        run: pip install --quiet -r .harness/scripts/requirements.txt
      - name: council.py imports cleanly
        run: |
          python3 -c "
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location('c', pathlib.Path('.harness/scripts/council.py'))
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          print('council.py loaded OK')
          "
