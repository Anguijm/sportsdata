app = 'sportsdata-api'
primary_region = 'dfw'

[build]

[env]
  PORT = '3001'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'sportsdata_vol'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
