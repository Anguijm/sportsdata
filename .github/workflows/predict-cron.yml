name: Predict Cron

# Council mandate (Sprint 7): twice daily — 5am UTC catches early scrapes,
# 22:00 UTC catches West Coast game confirmations.
on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape on Fly.io
        # Sprint 10.6: failures here are NOT silently swallowed. If this
        # curl fails the whole workflow fails and we find out on the same
        # day rather than four days later. `sport=all` explicitly scrapes
        # every league (nfl/nba/mlb/nhl/mls/epl) — this replaces the
        # deleted scrape-cron.yml which was *supposed* to cover every
        # league but had been hitting a dead /api/trigger-cycle route.
        # The endpoint returns 502 if any ESPN fetch fail-closes, so -f
        # will turn a silent upstream outage into a red workflow run.
        #
        # Sprint 10.8 (post-2026-04-15 06:20 UTC incident): add retry to
        # survive Fly-proxy 502s emitted during deploy-machine restarts.
        # On that date, PR #30 merged at ~06:15, deploy-fly.yml killed the
        # app machine, the scrape cron hit the proxy at 06:20:36 during
        # the <5s restart window, got 502, alerted. `last_scrape_at` on
        # the health endpoint was fresh 5s later. `curl --retry 3
        # --retry-delay 15` retries on 408/429/500/502/503/504 and
        # connection errors, NOT on 4xx auth/validation errors — which
        # preserves the fail-fast semantics for real bugs while absorbing
        # transient deploy blips. After 3 retries (~45s) a persistent 502
        # still fails the workflow and alerts correctly. Curl prints
        # "Warning: Transient problem: ..." to stderr on each retry, so
        # the action log will reveal how often the fix triggers.
        run: |
          curl -sSf --retry 3 --retry-delay 15 \
            --write-out "\nscrape_http=%{response_code}\n" \
            -X POST "https://sportsdata-api.fly.dev/api/trigger/scrape?sport=all" \
            -H "Authorization: Bearer ${{ secrets.PREDICT_TRIGGER_TOKEN }}" \
            --max-time 600

      - name: Trigger predict on Fly.io
        # sport=all generates v2 winner + v4-spread predictions for every
        # league, not just NBA. The endpoint returns 502 if any sport fails
        # (partial failure). We print the response body to see which sport
        # errored, then fail the step so the alert fires.
        #
        # Retry semantics: same as scrape step above. Transient Fly-proxy
        # 502s during deploy restarts get 3 retries at 15s apart; real
        # app-level 502 (partial failure with body) or any 4xx still fails
        # the workflow on the first try (--retry excludes 4xx by default).
        # Note: curl --retry requires a 2xx before printing the body, so a
        # successful retry returns a normal body to parse below.
        run: |
          RESPONSE=$(curl -sS --retry 3 --retry-delay 15 -w "\n%{response_code}" \
            -X POST "https://sportsdata-api.fly.dev/api/trigger/predict?sport=all" \
            -H "Authorization: Bearer ${{ secrets.PREDICT_TRIGGER_TOKEN }}" \
            --max-time 600)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "predict_http=$HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Predict returned HTTP $HTTP_CODE (after up to 3 retries)"
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Predict cron failed! Check https://sportsdata-api.fly.dev/api/health for staleness."
          echo "::error::Last successful scrape and predict timestamps should be within 24 hours."
